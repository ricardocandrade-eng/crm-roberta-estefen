<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roberta Estefen">
<meta name="theme-color" content="#2D2347">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Roberta Estefen — Psicologia</title>

<!-- OneSignal — Push Notifications -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "9468c173-c8ee-4251-95fb-1aafbdf582f0",
      serviceWorkerPath: "OneSignalSDKWorker.js",
      serviceWorkerParam: { scope: "/crm-roberta-estefen/" },
      promptOptions: {
        slidedown: {
          prompts: [{
            type: "push",
            autoPrompt: true,
            text: {
              actionMessage: "Receba lembretes de consultas e avisos do consultório.",
              acceptButton: "Permitir",
              cancelButton: "Agora não"
            },
            delay: { pageViews: 1, timeDelay: 5 }
          }]
        }
      }
    });
  });
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #2D2347; }

  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, #2D2347 0%, #7B6CA8 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  #splash img { width: 96px; height: 96px; border-radius: 22px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  #splash h1 { color: #F0EDF8; font-family: -apple-system, sans-serif; font-size: 20px; font-weight: 600; }
  #splash p  { color: #B8AEDA; font-family: -apple-system, sans-serif; font-size: 14px; }
  #footer    { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center;
               font-family: -apple-system, sans-serif; display: flex; flex-direction: column; gap: 3px; }
  #version   { color: rgba(184,174,218,0.5); font-size: 11px; }
  #credits   { color: rgba(184,174,218,0.3); font-size: 10px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(240,237,248,0.2);
    border-top-color: #F0EDF8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #frame { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>

<!-- Tela de carregamento -->
<div id="splash">
  <img src="icon.png" alt="Ícone">
  <h1>Roberta Estefen</h1>
  <p>Psicologia</p>
  <div class="spinner"></div>
  <div id="footer">
    <span id="version">carregando...</span>
    <span id="credits">Desenvolvido por Ricardo Andrade</span>
  </div>
</div>

<!-- App -->
<iframe id="frame" src="about:blank" allow="camera; microphone"></iframe>

<script>
  // URL fixa do sistema — nunca muda
  var APP_URL = "https://script.google.com/macros/s/AKfycbzxwSgPYgLE-oNLAm3EaLLj32nWQRt7KoooM7S7A-Jn1FVd8Kv0LxLzYvJey5MWm1mFWQ/exec";

  // Registra o Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Busca e exibe a versão do último deploy
  fetch('version.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      var el = document.getElementById('version');
      if (el && data.version) el.textContent = 'v' + data.version;
    })
    .catch(() => {});

  // Carrega o app
  function loadApp() {
    var splash = document.getElementById('splash');
    var frame  = document.getElementById('frame');
    frame.src = APP_URL;
    frame.onload = function() {
      setTimeout(function() { splash.style.display = 'none'; }, 400);
    };
    setTimeout(function() { splash.style.display = 'none'; }, 8000);
  }

  loadApp();
</script>
</body>
</html>
