<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roberta Estefen">
<meta name="theme-color" content="#2D2347">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Roberta Estefen — Psicologia</title>

<!-- ═══════════════════════════════════════════════════
     OneSignal — Push Notifications
     Substitua SEU_APP_ID_ONESIGNAL pelo App ID real
═══════════════════════════════════════════════════ -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "9468c173-c8ee-4251-95fb-1aafbdf582f0",
      serviceWorkerPath: "OneSignalSDKWorker.js",
      // Pede permissão de forma suave, sem popup agressivo
      promptOptions: {
        slidedown: {
          prompts: [{
            type: "push",
            autoPrompt: true,
            text: {
              actionMessage: "Receba lembretes de consultas e avisos do consultório.",
              acceptButton: "Permitir",
              cancelButton: "Agora não"
            },
            delay: { pageViews: 1, timeDelay: 5 }
          }]
        }
      }
    });
  });
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #2D2347; }

  /* ── Tela de carregamento ── */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, #2D2347 0%, #7B6CA8 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  }
  #splash img { width: 96px; height: 96px; border-radius: 22px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  #splash h1 { color: #F0EDF8; font-family: -apple-system, sans-serif; font-size: 20px; font-weight: 600; }
  #splash p  { color: #B8AEDA; font-family: -apple-system, sans-serif; font-size: 14px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(240,237,248,0.2);
    border-top-color: #F0EDF8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal de configuração (primeira vez) ── */
  #setup {
    position: fixed; inset: 0; z-index: 200;
    background: linear-gradient(135deg, #2D2347 0%, #7B6CA8 100%);
    display: none; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px 24px; gap: 16px;
  }
  #setup img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 8px; }
  #setup h2 { color: #F0EDF8; font-family: -apple-system, sans-serif; font-size: 22px; font-weight: 700; text-align: center; }
  #setup p  { color: #B8AEDA; font-family: -apple-system, sans-serif; font-size: 14px; text-align: center; line-height: 1.5; }
  #setup input {
    width: 100%; padding: 14px 16px; border-radius: 12px;
    border: 2px solid rgba(240,237,248,0.2); background: rgba(255,255,255,0.1);
    color: #F0EDF8; font-family: -apple-system, sans-serif; font-size: 14px;
    outline: none;
  }
  #setup input::placeholder { color: #B8AEDA; }
  #setup input:focus { border-color: #B8AEDA; }
  #setup button {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: #F0EDF8; color: #2D2347;
    font-family: -apple-system, sans-serif; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
  }
  #setup .error { color: #FCA5A5; font-family: -apple-system, sans-serif; font-size: 13px; display: none; }

  /* ── iframe principal ── */
  #frame {
    width: 100%; height: 100%;
    border: none; display: block;
  }
</style>
</head>
<body>

<!-- Tela de configuração (apenas na primeira vez) -->
<div id="setup">
  <img src="icon.png" alt="Ícone">
  <h2>Configurar app</h2>
  <p>Cole abaixo o link do seu sistema (Google Apps Script). Isso só precisa ser feito uma vez.</p>
  <input type="url" id="urlInput" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
  <div class="error" id="urlError">Por favor, cole um link válido do Google Apps Script.</div>
  <button onclick="saveUrl()">Salvar e abrir</button>
</div>

<!-- Tela de carregamento -->
<div id="splash">
  <img src="icon.png" alt="Ícone">
  <h1>Roberta Estefen</h1>
  <p>Psicologia</p>
  <div class="spinner"></div>
</div>

<!-- App -->
<iframe id="frame" src="about:blank" allow="camera; microphone"></iframe>

<script>
  // Registra o Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  var STORAGE_KEY = 're_crm_url';

  function getStoredUrl() {
    try { return localStorage.getItem(STORAGE_KEY); } catch(e) { return null; }
  }

  function storeUrl(url) {
    try { localStorage.setItem(STORAGE_KEY, url); } catch(e) {}
  }

  function isValidGASUrl(url) {
    return url && (
      url.startsWith('https://script.google.com/macros/s/') ||
      url.startsWith('https://script.googleusercontent.com/')
    );
  }

  function saveUrl() {
    var url = document.getElementById('urlInput').value.trim();
    if (!isValidGASUrl(url)) {
      document.getElementById('urlError').style.display = 'block';
      return;
    }
    storeUrl(url);
    document.getElementById('setup').style.display = 'none';
    loadApp(url);
  }

  function loadApp(url) {
    var splash = document.getElementById('splash');
    var frame  = document.getElementById('frame');
    splash.style.display = 'flex';
    frame.src = url;
    frame.onload = function() {
      setTimeout(function() { splash.style.display = 'none'; }, 400);
    };
    // Fallback: esconde splash após 8s mesmo que onload não dispare
    setTimeout(function() { splash.style.display = 'none'; }, 8000);
  }

  // Ao iniciar
  var stored = getStoredUrl();
  if (stored) {
    loadApp(stored);
  } else {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
  }
</script>
</body>
</html>
